---
- name: Check if dotnet is installed
  ansible.builtin.command: which dotnet
  register: dotnet_which
  changed_when: false
  failed_when: false

- name: Install .NET SDK via Microsoft install script
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir "$HOME/.dotnet"
  args:
    creates: "{{ ansible_env.HOME }}/.dotnet/dotnet"
  when: dotnet_which.rc != 0
