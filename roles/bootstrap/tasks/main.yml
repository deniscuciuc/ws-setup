---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure prerequisite packages are installed
  ansible.builtin.apt:
    name:
      - git
      - curl
      - software-properties-common
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Ensure ansible is installed via apt
  ansible.builtin.apt:
    name: ansible
    state: present
