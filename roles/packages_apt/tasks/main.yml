---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure Docker apt repository prerequisites are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install core apt packages
  ansible.builtin.apt:
    name: "{{ apt_packages_core + apt_packages_dev + apt_packages_pyenv }}"
    state: present
  register: apt_core_install_result
  retries: 3
  delay: 10
  until: apt_core_install_result is succeeded

- name: Install desktop apt packages
  ansible.builtin.apt:
    name: "{{ apt_packages_desktop }}"
    state: present
  register: apt_desktop_install_result
  retries: 3
  delay: 10
  until: apt_desktop_install_result is succeeded
  when: install_desktop_packages | default(true) | bool
