---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install curated apt packages
  ansible.builtin.apt:
    name: "{{ apt_packages }}"
    state: present
  register: apt_install_result
  retries: 3
  delay: 10
  until: apt_install_result is succeeded
