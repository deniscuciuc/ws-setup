---
- name: Ensure Desktop directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/Desktop"
    state: directory
    mode: '0755'

- name: Render post-provisioning checklist
  ansible.builtin.template:
    src: SETUP_CHECKLIST.md.j2
    dest: "{{ user_home }}/Desktop/SETUP_CHECKLIST.md"
    mode: '0644'

- name: Display completion message
  ansible.builtin.debug:
    msg: |
      Provisioning complete.
      Please open ~/Desktop/SETUP_CHECKLIST.md and complete the manual steps.
