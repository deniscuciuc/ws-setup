---
# Repository and tooling constants
dotfiles_repo: "deniscuciuc"
chezmoi_install_url: "https://get.chezmoi.io"
chezmoi_bin_path: "{{ user_home }}/.local/bin"

# Installation flags (can be overridden per run)
install_nvm: true
install_pyenv: true
install_dotnet: true
run_snap_installs: true
install_desktop_packages: true

# Paths
ws_setup_repo: "https://github.com/deniscuciuc/ws-setup.git"
ws_setup_raw_url: "https://github.com/deniscuciuc/ws-setup"
ws_setup_dir: "{{ user_home }}/.local/share/ws-setup"
