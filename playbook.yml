---
- name: Provision Ubuntu 26.04 developer workstation
  hosts: localhost
  become: yes
  any_errors_fatal: false
  gather_facts: false

  pre_tasks:
    - name: Gather facts as the current user
      ansible.builtin.setup:
      become: false

  roles:
    - role: bootstrap
    - role: packages_apt
    - role: packages_snap
    - role: dotfiles
      become: false
    - role: devtools
      become: false
    - role: manual_checklist
      become: false
