---
- name: Provision Ubuntu 26.04 developer workstation
  hosts: localhost
  become: true
  gather_facts: true

  pre_tasks:
    - name: Capture current user home directory
      ansible.builtin.set_fact:
        user_home: "{{ lookup('env', 'HOME') }}"
      become: false

  roles:
    - role: bootstrap
    - role: packages_apt
    - role: packages_snap
    - role: dotfiles
      become: false
    - role: devtools
      become: false
    - role: manual_checklist
      become: false
